<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="A compact, data-forward ramp from 30px page leads down to 10px column heads." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; display: flex; flex-direction: column; gap: 11px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tk { width: 132px; flex: none; font: 11px var(--font-mono); color: var(--text-faint); }
  .sample { color: var(--text-strong); font-family: var(--font-sans); white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="tk">3xl · 30 / bold</span><span class="sample" style="font-size:30px;font-weight:700;letter-spacing:-.02em">行政區排行</span></div>
  <div class="line"><span class="tk">2xl · 24 · KPI</span><span class="sample" style="font-size:24px;font-weight:700;letter-spacing:-.02em;font-family:var(--font-mono)">28,431</span></div>
  <div class="line"><span class="tk">xl · 20 / semibold</span><span class="sample" style="font-size:20px;font-weight:600">類型統計</span></div>
  <div class="line"><span class="tk">lg · 16 / semibold</span><span class="sample" style="font-size:16px;font-weight:600">永康區 · 透天厝</span></div>
  <div class="line"><span class="tk">base · 14 · body</span><span class="sample" style="font-size:14px;font-weight:400">成交資料以內政部實價登錄為準</span></div>
  <div class="line"><span class="tk">xs · 12 · chip</span><span class="sample" style="font-size:12px;font-weight:500">套用篩選</span></div>
  <div class="line"><span class="tk">3xs · 10 · CAPS head</span><span class="sample" style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint)">均單價 萬/坪</span></div>
</body>
</html>
