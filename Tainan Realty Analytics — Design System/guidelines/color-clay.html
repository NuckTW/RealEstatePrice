<!-- @dsCard group="Colors" viewport="700x180" name="Clay — Secondary" subtitle="Warm terracotta / 赤崁 brick secondary. Sparingly: avg-total KPI, highlights, the brand gradient's warm end." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-card); }
  .chip { height: 56px; }
  .meta { padding: 8px 10px; background: var(--surface-card); }
  .name { font: var(--weight-semibold) 12px var(--font-mono); color: var(--text-default); }
  .hex { font: 11px var(--font-mono); color: var(--text-faint); margin-top: 2px; }
  .star { color: var(--secondary-tint); font-size: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--clay-200)"></div><div class="meta"><div class="name">clay-200</div><div class="hex">#f1c5af</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-300)"></div><div class="meta"><div class="name">clay-300</div><div class="hex">#e3a081</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-400)"></div><div class="meta"><div class="name">clay-400 <span class="star">tint ★</span></div><div class="hex">#d57a54</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-500)"></div><div class="meta"><div class="name">clay-500 <span class="star">secondary ★</span></div><div class="hex">#c0613d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-600)"></div><div class="meta"><div class="name">clay-600</div><div class="hex">#9c4a2c</div></div></div>
  </div>
</body>
</html>
