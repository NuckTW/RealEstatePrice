<!-- @dsCard group="Colors" viewport="700x150" name="Data-viz series" subtitle="8 categorical colours for chart series & table bars — warm-led, evenly-spaced, with no leafy green." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .dot { width: 100%; height: 40px; border-radius: var(--radius-sm); }
  .name { font: var(--weight-medium) 10px var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="dot" style="background:var(--series-1)"></div><div class="name">brass</div></div>
    <div class="sw"><div class="dot" style="background:var(--series-2)"></div><div class="name">clay</div></div>
    <div class="sw"><div class="dot" style="background:var(--series-3)"></div><div class="name">sky</div></div>
    <div class="sw"><div class="dot" style="background:var(--series-4)"></div><div class="name">plum</div></div>
    <div class="sw"><div class="dot" style="background:var(--series-5)"></div><div class="name">rose</div></div>
    <div class="sw"><div class="dot" style="background:var(--series-6)"></div><div class="name">teal</div></div>
    <div class="sw"><div class="dot" style="background:var(--series-7)"></div><div class="name">slate</div></div>
    <div class="sw"><div class="dot" style="background:var(--series-8)"></div><div class="name">sand</div></div>
  </div>
</body>
</html>
