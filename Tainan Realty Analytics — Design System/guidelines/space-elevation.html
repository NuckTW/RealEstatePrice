<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & glow" subtitle="Dark UI lifts with borders + soft shadow; brass glow is reserved for the primary action." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 28px; }
  .row { display: flex; gap: 20px; align-items: center; }
  .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 100%; height: 72px; border-radius: var(--radius-lg); background: var(--surface-card); border: 1px solid var(--border-card); display:flex; align-items:center; justify-content:center; font: var(--weight-medium) 12px var(--font-sans); color: var(--text-muted); }
  .lab { font: 11px var(--font-mono); color: var(--text-faint); }
  .btn { background: var(--gradient-accent); color: #04130d; border:none; font-weight:600; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-card)">card</div><span class="lab">shadow-card</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-pop)">popover</div><span class="lab">shadow-pop</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-overlay)">overlay</div><span class="lab">shadow-overlay</span></div>
    <div class="col"><div class="box btn" style="box-shadow:var(--glow-accent)">套用篩選</div><span class="lab">glow-accent</span></div>
  </div>
</body>
</html>
