<!-- @dsCard group="Colors" viewport="700x210" name="Ink ground & lines" subtitle="Warm, brown-tinted near-blacks every dark surface is built from, plus the three hairline border weights." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; }
  .row { display: flex; gap: 10px; margin-bottom: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-card); }
  .chip { height: 44px; }
  .meta { padding: 7px 9px; background: var(--surface-card); }
  .name { font: var(--weight-semibold) 11px var(--font-mono); color: var(--text-default); }
  .hex { font: 10px var(--font-mono); color: var(--text-faint); margin-top: 2px; }
  .lines { display: flex; gap: 10px; }
  .lbox { flex: 1; height: 48px; border-radius: var(--radius-md); background: var(--surface-card); display: flex; align-items: center; justify-content: center; font: var(--weight-medium) 11px var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="meta"><div class="name">ink-950</div><div class="hex">#0c0a06</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">ink-900 · app</div><div class="hex">#15110b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-850)"></div><div class="meta"><div class="name">ink-850</div><div class="hex">#1b160e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="meta"><div class="name">ink-800 · card</div><div class="hex">#211b12</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-750)"></div><div class="meta"><div class="name">ink-750 · ctrl</div><div class="hex">#29221a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">ink-700 · hover</div><div class="hex">#342b20</div></div></div>
  </div>
  <div class="lines">
    <div class="lbox" style="border:1px solid var(--line-soft)">line-soft</div>
    <div class="lbox" style="border:1px solid var(--line-mid)">line-mid</div>
    <div class="lbox" style="border:1px solid var(--line-strong)">line-strong</div>
  </div>
</body>
</html>
