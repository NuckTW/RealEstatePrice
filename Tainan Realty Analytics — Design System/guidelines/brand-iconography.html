<!-- @dsCard group="Brand" viewport="700x210" name="Iconography — glyph set" subtitle="The product's icon language is monochrome Unicode geometric glyphs (no icon font). Lucide is the suggested CDN substitute for richer needs." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 10px 4px;
    background: var(--surface-card); border: 1px solid var(--border-card); border-radius: var(--radius-md); }
  .g { font-size: 20px; color: var(--accent-tint); line-height: 1; }
  .n { font: 9px var(--font-sans); color: var(--text-faint); text-align: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="ic"><span class="g">▦</span><span class="n">看板</span></div>
    <div class="ic"><span class="g">◈</span><span class="n">趨勢</span></div>
    <div class="ic"><span class="g">◇</span><span class="n">問答</span></div>
    <div class="ic"><span class="g">◳</span><span class="n">單價</span></div>
    <div class="ic"><span class="g">◰</span><span class="n">坪數</span></div>
    <div class="ic"><span class="g">◆</span><span class="n">總價</span></div>
    <div class="ic"><span class="g">↗</span><span class="n">上漲</span></div>
    <div class="ic"><span class="g">↘</span><span class="n">下跌</span></div>
    <div class="ic"><span class="g">◵</span><span class="n">地圖</span></div>
    <div class="ic"><span class="g">‹</span><span class="n">上一頁</span></div>
    <div class="ic"><span class="g">›</span><span class="n">下一頁</span></div>
    <div class="ic"><span class="g">▾</span><span class="n">展開</span></div>
    <div class="ic"><span class="g">×</span><span class="n">移除</span></div>
    <div class="ic"><span class="g">◌</span><span class="n">無資料</span></div>
    <div class="ic"><span class="g">●</span><span class="n">狀態點</span></div>
    <div class="ic"><span class="g">南</span><span class="n">品牌</span></div>
  </div>
</body>
</html>
