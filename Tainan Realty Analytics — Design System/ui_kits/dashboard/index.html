<!-- @dsCard group="台南儀表板 Dashboard" viewport="1320x880" name="台南市不動產分析 — 完整介面" subtitle="Interactive recreation: filter bar, KPI dashboard, the new analytics charts, and the Gemini AI Q&A." -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>台南市不動產分析</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { background: var(--bg-app); }
  #root { min-height: 100%; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="Navbar.jsx"></script>
  <script type="text/babel" src="FilterBar.jsx"></script>
  <script type="text/babel" src="DashboardScreen.jsx"></script>
  <script type="text/babel" src="AnalyticsScreen.jsx"></script>
  <script type="text/babel" src="ChatScreen.jsx"></script>
  <script type="text/babel">
    const DEFAULT_FILTERS = {
      fromYear: '114', fromMonth: '1', toYear: '115', toMonth: '6',
      districts: [], types: [], presale: 'all', age: 'all',
    };
    function App() {
      const [view, setView] = React.useState('dashboard');
      const [draft, setDraft] = React.useState(DEFAULT_FILTERS);
      const [applied, setApplied] = React.useState(DEFAULT_FILTERS);
      const [loading, setLoading] = React.useState(false);
      const apply = () => {
        setLoading(true);
        setTimeout(() => { setApplied(draft); setLoading(false); }, 650);
      };
      const clear = () => { setDraft(DEFAULT_FILTERS); setApplied(DEFAULT_FILTERS); };
      return (
        <div>
          <Navbar view={view} onNav={setView} />
          {view !== 'chat' && (
            <FilterBar filters={draft} onChange={setDraft} onApply={apply} onClear={clear} loading={loading} />
          )}
          {view === 'dashboard' && <DashboardScreen filters={applied} />}
          {view === 'analytics' && <AnalyticsScreen />}
          {view === 'chat' && <ChatScreen />}
        </div>
      );
    }
    // Restore persisted light/dark choice before first paint.
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('tra-theme'); } catch (e) {}
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
